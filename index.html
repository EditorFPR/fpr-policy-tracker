const Badge = ({ status }) => {
  const m = STATUS_META[status] || STATUS_META["Not Started"];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "3px 10px", borderRadius: 20, fontSize: 12, fontWeight: 600,
      color: m.color, background: m.bg,
    }}>
      <span style={{ width: 6, height: 6, borderRadius: "50%", background: m.dot, flexShrink: 0 }} />
      {status}
    </span>
  );
};

const ProgressBar = ({ value, status }) => {
  const colors = { "Delivered": "#16A34A", "In Progress": "#2563EB", "Delayed": "#DC2626", "Under Review": "#7C3AED", "Not Started": "#D1D5DB" };
  return (
    <div style={{ height: 6, background: "#E5E7EB", borderRadius: 3, overflow: "hidden" }}>
      <div style={{ height: "100%", width: `${value}%`, background: colors[status] || "#9CA3AF", borderRadius: 3, transition: "width 0.6s ease" }} />
    </div>
  );
};

const StatCard = ({ value, label, sub, color }) => (
  <div style={{ background: "#fff", borderRadius: 12, padding: "20px 24px", border: "1px solid var(--border)", flex: 1 }}>

);

        <div style={{ padding: "20px 28px", borderBottom: "1px solid var(--border)" }}>

                  {i < policy.milestones.length - 1 && (

              border: policy.impact.includes("BROKEN PROMISE") ? "1px solid #FECACA" : "1px solid #BFDBFE", 
              borderRadius: 8, padding: "12px 16px", fontSize: 14, 
              color: policy.impact.includes("BROKEN PROMISE") ? "#991B1B" : "#1E40AF", 
              lineHeight: 1.6 
            }}>
              {policy.impact}
            </div>
          </div>
        )}
      </div>
    </div>

};

    count: policies.filter(p => p.category === cat).length,
    delivered: policies.filter(p => p.category === cat && p.status === "Delivered").length,
  }));

  const recent = [...policies].sort((a, b) => b.progress - a.progress).slice(0, 5);

  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "32px 24px" }}>
      <div style={{ marginBottom: 28 }}>
        <h1 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 26, fontWeight: 700, color: "var(--navy)" }}>Coalition Government Policy Tracker</h1>
        <p style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 6 }}>
          Tracking {total} real commitments by Rabuka's Coalition Government since December 2022. 
          Based on manifesto promises, parliamentary Hansard, and ministerial statements. 
          <strong style={{ color: "var(--coral)" }}> Updated May 2026</strong>
        </p>
      </div>

      <div style={{ display: "flex", gap: 16, marginBottom: 28, flexWrap: "wrap" }}>
        <StatCard value={total} label="Total Tracked" sub="Real manifesto commitments" />
        <StatCard value={`${Math.round((delivered/total)*100)}%`} label="Delivered" sub={`${delivered} of ${total} complete`} color="#16A34A" />
        <StatCard value={inProgress} label="In Progress" sub="Active implementation" color="#2563EB" />
        <StatCard value={delayed + notStarted} label="Stalled/Broken" sub={`${notStarted} broken promises`} color="#DC2626" />
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 24 }}>
        <div style={{ background: "#fff", borderRadius: 12, padding: "24px", border: "1px solid var(--border)" }}>
          <h2 style={{ fontSize: 15, fontWeight: 700, color: "var(--text-primary)", marginBottom: 20 }}>Progress by Policy Area</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            {byCategory.filter(({count}) => count > 0).map(({ cat, count, delivered }) => (
              <div key={cat}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontSize: 13, fontWeight: 500 }}>{cat}</span>
                  <span style={{ fontSize: 12, color: "var(--text-muted)" }}>{delivered}/{count} delivered</span>
                </div>
                <div style={{ height: 8, background: "#EFF2F7", borderRadius: 4, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${(delivered/count)*100}%`, background: "var(--coral)", borderRadius: 4 }} />
                </div>
              </div>
            ))}
          </div>
        </div>

        <div style={{ background: "#fff", borderRadius: 12, padding: "24px", border: "1px solid var(--border)" }}>
          <h2 style={{ fontSize: 15, fontWeight: 700, color: "var(--text-primary)", marginBottom: 20 }}>Status Overview</h2>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {Object.entries(STATUS_META).map(([status, m]) => {
              const count = policies.filter(p => p.status === status).length;
              if (count === 0) return null;
              return (
                <div key={status} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 10, height: 10, borderRadius: "50%", background: m.dot, flexShrink: 0 }} />
                  <span style={{ fontSize: 13, flex: 1 }}>{status}</span>
                  <div style={{ flex: 2, height: 8, background: "#EFF2F7", borderRadius: 4, overflow: "hidden" }}>
                    <div style={{ height: "100%", width: `${(count/total)*100}%`, background: m.dot, borderRadius: 4 }} />
                  </div>
                  <span style={{ fontSize: 13, fontWeight: 600, minWidth: 24, textAlign: "right" }}>{count}</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      <div style={{ background: "#fff", borderRadius: 12, padding: "24px", border: "1px solid var(--border)" }}>
        <h2 style={{ fontSize: 15, fontWeight: 700, color: "var(--text-primary)", marginBottom: 16 }}>Major Policy Achievements</h2>
        <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
          {recent.map((p, i) => {
            const min = ministries.find(m => m.id === p.ministry);
            return (
              <div key={p.id} onClick={() => onSelectPolicy(p)} style={{
                display: "flex", alignItems: "center", gap: 16, padding: "14px 12px", cursor: "pointer",
                borderRadius: 8, transition: "background 0.15s",
                borderBottom: i < recent.length - 1 ? "1px solid var(--border)" : "none",
              }}
              onMouseEnter={e => e.currentTarget.style.background = "#F8FAFC"}
              onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <div style={{ flex: 3, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.title}</div>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", marginTop: 2 }}>{min?.name}</div>
                </div>
                <Badge status={p.status} />
                <div style={{ flex: 1, minWidth: 80 }}>
                  <ProgressBar value={p.progress} status={p.status} />
                  <div style={{ fontSize: 11, color: "var(--text-muted)", marginTop: 4, textAlign: "right" }}>{p.progress}%</div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const PoliciesView = ({ policies, ministries, onSelectPolicy }) => {
  const [search, setSearch] = React.useState("");
  const [filterStatus, setFilterStatus] = React.useState("All");
  const [filterCat, setFilterCat] = React.useState("All");
  const [filterMin, setFilterMin] = React.useState("All");

  const filtered = policies.filter(p => {
    if (filterStatus !== "All" && p.status !== filterStatus) return false;
    if (filterCat !== "All" && p.category !== filterCat) return false;
    if (filterMin !== "All" && p.ministry !== filterMin) return false;
    if (search && !p.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const selectStyle = { padding: "8px 12px", border: "1px solid var(--border)", borderRadius: 8, fontSize: 13, background: "#fff", color: "var(--text-primary)", cursor: "pointer" };

  return (
    <div style={{ maxWidth: 1140, margin: "0 auto", padding: "32px 24px" }}>
      <div style={{ marginBottom: 24 }}>
        <h1 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 26, fontWeight: 700, color: "var(--navy)" }}>All Policies</h1>
        <p style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 6 }}>Browse and filter real government commitments with sourced tracking</p>
      </div>

      <div style={{ background: "#fff", borderRadius: 12, padding: "16px 20px", border: "1px solid var(--border)", marginBottom: 20, display: "flex", gap: 12, flexWrap: "wrap", alignItems: "center" }}>
        <input
          value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search policies…"
          style={{ ...selectStyle, flex: "1 1 200px", outline: "none" }}
        />
        <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={selectStyle}>
          {STATUSES.map(s => <option key={s}>{s}</option>)}
        </select>
        <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={selectStyle}>
          {CATEGORIES.map(c => <option key={c}>{c}</option>)}
        </select>
        <select value={filterMin} onChange={e => setFilterMin(e.target.value)} style={selectStyle}>
          <option value="All">All Ministries</option>
          {ministries.map(m => <option key={m.id} value={m.id}>{m.name.replace("Ministry of ","")}</option>)}
        </select>
        <span style={{ fontSize: 13, color: "var(--text-muted)", whiteSpace: "nowrap" }}>{filtered.length} results</span>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
        {filtered.map(p => {
          const min = ministries.find(m => m.id === p.ministry);
          return (
            <div key={p.id} onClick={() => onSelectPolicy(p)}
              style={{ background: "#fff", border: "1px solid var(--border)", borderRadius: 12, padding: "18px 20px", cursor: "pointer", transition: "box-shadow 0.15s, border-color 0.15s" }}
              onMouseEnter={e => { e.currentTarget.style.boxShadow = "0 4px 16px rgba(44,53,73,0.1)"; e.currentTarget.style.borderColor = "#e07a5f"; }}
              onMouseLeave={e => { e.currentTarget.style.boxShadow = "none"; e.currentTarget.style.borderColor = "var(--border)"; }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 16 }}>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginBottom: 6 }}>
                    <Badge status={p.status} />
                    <span style={{ fontSize: 11, background: "#F1F4F9", color: "var(--text-secondary)", padding: "2px 8px", borderRadius: 10, fontWeight: 500 }}>{p.category}</span>
                    <span style={{ fontSize: 11, color: "var(--text-muted)" }}>{p.commitmentType}</span>
                  </div>
                  <h3 style={{ fontSize: 15, fontWeight: 600, color: "var(--text-primary)", lineHeight: 1.4 }}>{p.title}</h3>
                  <div style={{ fontSize: 13, color: "var(--text-secondary)", marginTop: 4 }}>
                    {min?.name} · {min?.minister}
                    {min?.note && <span style={{ fontStyle: "italic", color: "var(--coral)" }}> · {min.note}</span>}
                  </div>
                </div>
                <div style={{ minWidth: 120, flexShrink: 0 }}>
                  <div style={{ fontSize: 12, color: "var(--text-muted)", textAlign: "right", marginBottom: 6 }}>
                    {p.milestones.filter(m => m.done).length}/{p.milestones.length} milestones
                  </div>
                  <ProgressBar value={p.progress} status={p.status} />
                  <div style={{ fontSize: 12, fontWeight: 700, color: "var(--navy)", textAlign: "right", marginTop: 4 }}>{p.progress}%</div>
                </div>
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "48px", color: "var(--text-muted)", background: "#fff", borderRadius: 12, border: "1px solid var(--border)" }}>
            No policies match your filters.
          </div>
        )}
      </div>
    </div>
  );
};

const MinistriesView = ({ policies, ministries, onSelectPolicy }) => (
  <div style={{ maxWidth: 1140, margin: "0 auto", padding: "32px 24px" }}>
    <div style={{ marginBottom: 28 }}>
      <h1 style={{ fontFamily: "'Libre Baskerville', serif", fontSize: 26, fontWeight: 700, color: "var(--navy)" }}>By Ministry</h1>
      <p style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 6 }}>Policy progress by current ministers (as of May 2026)</p>
    </div>
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 16 }}>
      {ministries.map(min => {
        const mPolicies = policies.filter(p => p.ministry === min.id);
        if (!mPolicies.length) return null;
        const delivered = mPolicies.filter(p => p.status === "Delivered").length;
        const avgProg = Math.round(mPolicies.reduce((a, b) => a + b.progress, 0) / mPolicies.length);
        return (
          <div key={min.id} style={{ background: "#fff", border: "1px solid var(--border)", borderRadius: 12, overflow: "hidden" }}>
            <div style={{ background: min.color, padding: "16px 20px", color: "#fff" }}>
              <div style={{ fontSize: 13, fontWeight: 700 }}>{min.name}</div>
              <div style={{ fontSize: 12, opacity: 0.8, marginTop: 3 }}>
                {min.minister}
                {min.note && <div style={{ fontSize: 11, marginTop: 2, opacity: 0.7 }}>{min.note}</div>}
              </div>
            </div>
            <div style={{ padding: "16px 20px" }}>
              <div style={{ display: "flex", gap: 16, marginBottom: 14 }}>
                <div style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "var(--navy)" }}>{mPolicies.length}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Policies</div>
                </div>
                <div style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "#16A34A" }}>{delivered}</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Delivered</div>
                </div>
                <div style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 22, fontWeight: 700, color: "var(--navy)" }}>{avgProg}%</div>
                  <div style={{ fontSize: 11, color: "var(--text-muted)" }}>Avg. Progress</div>
                </div>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                {mPolicies.map(p => (
                  <div key={p.id} onClick={() => onSelectPolicy(p)} style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer", padding: "6px 8px", borderRadius: 6, transition: "background 0.1s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#F8FAFC"}
                    onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                    <div style={{ width: 8, height: 8, borderRadius: "50%", background: STATUS_META[p.status]?.dot, flexShrink: 0 }} />
                    <span style={{ fontSize: 12, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.title}</span>
                    <span style={{ fontSize: 11, color: "var(--text-muted)", flexShrink: 0 }}>{p.progress}%</span>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })}
    </div>
  </div>
);

const Header = ({ view, setView }) => {
  const navBtn = (label, id) => (
    <button onClick={() => setView(id)} style={{
      background: "none", border: "none", color: view === id ? "#fff" : "rgba(255,255,255,0.65)",
      fontSize: 14, fontWeight: view === id ? 600 : 400, padding: "8px 16px", borderRadius: 8, transition: "all 0.15s",
      borderBottom: view === id ? "2px solid var(--coral)" : "2px solid transparent",
    }}>{label}</button>
  );
  return (
    <header style={{ background: "var(--navy)", borderBottom: "1px solid rgba(255,255,255,0.1)", position: "sticky", top: 0, zIndex: 100 }}>
      <div style={{ maxWidth: 1140, margin: "0 auto", padding: "0 24px", display: "flex", alignItems: "center", gap: 24, height: 60 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ width: 36, height: 36, borderRadius: "50%", background: "var(--coral)", border: "3px solid rgba(255,255,255,0.3)", display: "flex", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>FPR</span>
          </div>
          <div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", fontWeight: 500, letterSpacing: "0.04em", lineHeight: 1 }}>FIJI POLITICAL REVIEW</div>
            <div style={{ fontSize: 14, color: "#fff", fontWeight: 700, lineHeight: 1.3, fontFamily: "'Libre Baskerville', serif" }}>Coalition Policy Tracker</div>
          </div>
        </div>
        <nav style={{ display: "flex", marginLeft: 16 }}>
          {navBtn("Dashboard", "dashboard")}
          {navBtn("Policies", "policies")}
          {navBtn("Ministries", "ministries")}
        </nav>
        <div style={{ marginLeft: "auto", fontSize: 12, color: "rgba(255,255,255,0.5)" }}>
          Updated May 2026
        </div>
      </div>
    </header>
  );
};

const App = () => {
  const [view, setView] = React.useState("dashboard");
  const [selectedPolicy, setSelectedPolicy] = React.useState(null);

  const openPolicy = (p) => setSelectedPolicy(p);
  const closePolicy = () => setSelectedPolicy(null);

  return (
    <div style={{ minHeight: "100vh", background: "var(--bg)" }}>
      <style>{`
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
      `}</style>
      <Header view={view} setView={setView} />
      <main>
        {view === "dashboard" && <DashboardView policies={POLICIES} ministries={MINISTRIES} onSelectPolicy={openPolicy} />}
        {view === "policies" && <PoliciesView policies={POLICIES} ministries={MINISTRIES} onSelectPolicy={openPolicy} />}
        {view === "ministries" && <MinistriesView policies={POLICIES} ministries={MINISTRIES} onSelectPolicy={openPolicy} />}
      </main>
      {selectedPolicy && (
        <PolicyDetail policy={selectedPolicy} ministries={MINISTRIES} onClose={closePolicy} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
